name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    # Must be macOS — Wails needs Xcode tooling and WKWebView to package.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build universal .app
        run: make release-build

      - name: Archive
        id: archive
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          make release-tar VERSION="$VERSION"
          TARBALL="dist/pik-${VERSION}-darwin-universal.tar.gz"
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          files: ${{ steps.archive.outputs.tarball }}
          body: |
            ### Install via Homebrew
            ```sh
            brew install t4traw/pik/pik
            ```

            SHA-256: `${{ steps.archive.outputs.sha256 }}`

      # ---- Auto-bump the Homebrew tap ----
      # Requires a repo secret `TAP_GITHUB_TOKEN` = classic PAT with `repo` scope
      # on the separate `t4traw/homebrew-pik` repo. If the secret is missing,
      # this step no-ops so the release itself still succeeds.
      - name: Bump Homebrew formula
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION:   ${{ steps.ver.outputs.version }}
          SHA256:    ${{ steps.archive.outputs.sha256 }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping formula bump"
            exit 0
          fi
          VERSION_NO_V="${VERSION#v}"
          git clone --depth 1 \
            "https://x-access-token:${TAP_TOKEN}@github.com/t4traw/homebrew-pik.git" tap
          cd tap
          # BSD sed on macOS runners needs the empty arg after -i.
          sed -i '' -E "s/^(  version )\".*\"/\\1\"${VERSION_NO_V}\"/" Formula/pik.rb
          sed -i '' -E "s/^(  sha256 )\".*\"/\\1\"${SHA256}\"/"       Formula/pik.rb
          if git diff --quiet; then
            echo "formula already up to date"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pik.rb
          git commit -m "pik ${VERSION}"
          git push
